<div>
    <div>
        <app-text-input [label]="'Missing Value indicators'" [labelSuperScript]="'e.g NA, -999, NaN'"
            [value]="sourceMissingValueIndicators" (valueChange)="onSourceMissingValueIndicatorsChange($event)" />
    </div>

    <div class="mt-2">
        <app-check-box-input [label]="'Import Missing Values'" [value]="allowMissingValue"
            (valueChange)="onAllowMissingValueChange($event)" />
    </div>
</div>
