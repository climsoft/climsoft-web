<ng-container *ngIf="open">
  <app-dialog [(open)]="open" [title]="'Bulk Edit Stations'"
    [okButtonLabel]="saving ? 'Saving...' : 'Save Changes'"
    [displayOkOption]="true" [disableOkOption]="saving || changedCount === 0"
    [closeOnOkClick]="false" [closeOnCancelClick]="false"
    (okClick)="onSave()" (cancelClick)="onCancelClick()">

     <div class="d-flex justify-content-end align-items-center mb-2">
      <app-page-input [pageInputDefinition]="pageInputDefinition" (pageInputDefinitionChange)="0" />
      <div *ngIf="changedCount" class="vr mx-2"></div>
      <span *ngIf="changedCount" class="ms-2 text-success">{{ changedCount }} record(s) changed</span>
    </div>

    <div class="table-responsive" style="max-height: 70vh; overflow: auto;">
      <table class="table table-sm table-bordered align-middle">
        <thead class="table-light sticky-top">
          <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Description</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Elevation</th>
            <th style="min-width: 180px;">Obs Method</th>
            <th style="min-width: 180px;">Environment</th>
            <th style="min-width: 180px;">Focus</th>
            <th style="min-width: 180px;">Owner</th>
            <th style="min-width: 180px;">Operator</th>
            <th>WMO ID</th>
            <th>WIGOS ID</th>
            <th>ICAO ID</th>
            <th style="min-width: 150px;">Status</th>
            <th>Date Established</th>
            <th>Date Closed</th>
            <th>Comment</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let stn of pageItems; let i = index" [class.row-changed]="isRowChanged(pageStartIndex + i)">
            <td class="text-muted text-nowrap">{{ stn.id }}</td>
            <td>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="stn.name">
            </td>
            <td>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="stn.description">
            </td>
            <td>
              <input type="number" class="form-control form-control-sm" [(ngModel)]="stn.latitude" step="any">
            </td>
            <td>
              <input type="number" class="form-control form-control-sm" [(ngModel)]="stn.longitude" step="any">
            </td>
            <td>
              <input type="number" class="form-control form-control-sm" [(ngModel)]="stn.elevation" step="any">
            </td>
            <td>
              <app-station-obs-processing-single-selector [selectedId]="stn.stationObsProcessingMethod"
                (selectedIdChange)="stn.stationObsProcessingMethod = $event" />
            </td>
            <td>
              <app-station-environment-selector-single [selectedId]="stn.stationObsEnvironmentId"
                (selectedIdChange)="stn.stationObsEnvironmentId = $event" />
            </td>
            <td>
              <app-station-focus-selector-single [selectedId]="stn.stationObsFocusId"
                (selectedIdChange)="stn.stationObsFocusId = $event" />
            </td>
            <td>
              <app-organisation-selector-single-single [selectedId]="stn.ownerId"
                (selectedIdChange)="stn.ownerId = $event" />
            </td>
            <td>
              <app-organisation-selector-single-single [selectedId]="stn.operatorId"
                (selectedIdChange)="stn.operatorId = $event" />
            </td>
            <td>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="stn.wmoId">
            </td>
            <td>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="stn.wigosId">
            </td>
            <td>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="stn.icaoId">
            </td>
            <td>
              <app-station-status-selector-single [selectedId]="stn.status"
                (selectedIdChange)="stn.status = $event" />
            </td>
            <td>
              <input type="date" class="form-control form-control-sm" [(ngModel)]="stn.dateEstablished">
            </td>
            <td>
              <input type="date" class="form-control form-control-sm" [(ngModel)]="stn.dateClosed">
            </td>
            <td>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="stn.comment">
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </app-dialog>
</ng-container>
