<div>
    <app-radio-buttons-input [inline]="true" [asButtons]="true" [groupName]="'status'" [groupItems]="[
            { label: 'Includes Status', checked: isIncludes },
            { label: 'Does Not Include Status', checked: isNotIncludes }
        ]" (checkedValueChange)="onStatusSelection($event)" />

    <div class="ms-4 mt-3">
        <!-- Includes: column position + optional mapping -->
        <div *ngIf="isIncludes && status">
            <div class="mb-3">
                <app-number-input [label]="'Column Position'" [value]="status.columnPosition"
                    (valueChange)="onColumnPositionChange($event)" [min]="1" />
            </div>
            <div>
                <app-check-box-input [label]="'Fetch Specific Items'"
                    [value]="status.valueMappings !== undefined"
                    (valueChange)="onFetchSpecificChange($event)" />
            </div>
            <div *ngIf="status.valueMappings" class="ms-2 mt-2">
                <div class="d-flex justify-content-end mb-2">
                    <button type="button" class="btn btn-sm btn-primary" (click)="onAddMapping()">Add
                        Mapping</button>
                </div>
                <div *ngIf="status.valueMappings.length === 0" class="text-muted text-center py-2">
                    No mappings configured. Click "Add Mapping" to create one.
                </div>
                <table *ngIf="status.valueMappings.length > 0" class="table table-sm">
                    <thead>
                        <tr>
                            <th>Source ID</th>
                            <th>Database ID</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody class="table-group-divider">
                        <tr *ngFor="let vm of status.valueMappings; let i = index">
                            <td><app-text-input [id]="'import_stn_source_status_'+ i" [(value)]="vm.sourceId" /></td>
                            <td>
                                <app-station-status-selector-single [id]="'import_stn_db_status_'+ i" [selectedId]="$any(vm.databaseId)"
                                    (selectedIdChange)="vm.databaseId = $event || ''" />
                            </td>
                            <td>
                                <button type="button" class="btn btn-sm btn-outline-danger"
                                    (click)="onRemoveMapping(i)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Does Not Include: default selector -->
        <div *ngIf="isNotIncludes && status">
            <app-station-status-selector-single [label]="'Default Value'"
                [selectedId]="$any(status.defaultValue)"
                (selectedIdChange)="onDefaultValueChange($event)" />
        </div>
    </div>
</div>
