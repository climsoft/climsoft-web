<div class="card border-0">
  <div class="card-header d-flex justify-content-end align-items-center px-1 py-0">

    <div class="d-flex align-items-center gap-2">
      <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onNewExport()">
        Add
      </button>
      <div>
        <app-drop-down-button [buttonText]="'Options'" [dropDownItems]="['Delete All']"
          (dropDownOptionClick)="onOptionsClicked($event)" [offSetRight]="true" />
      </div>
      <div>
        <app-page-input [pageInputDefinition]="pageInputDefinition" (pageInputDefinitionChange)="loadExportSpecifications()" />
      </div>
    </div>
  </div>

  <div class="card-body px-0">
    <div class="app-table-container" style="max-height: 80vh;">
      <table class="table table-hover table-sm">
        <colgroup>
          <col style="width: 2%;" />
          <col style="width: 16%;" />
          <col style="width: 8%;" />
          <col style="width: 62%;" />
          <col style="width: 12%;" />
        </colgroup>
        <thead>
          <tr>
            <th></th>
            <th appSortableHeader="name" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Name</th>
            <th appSortableHeader="exportType" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Type</th>
            <th appSortableHeader="description" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody class="table-group-divider">
          <tr class="app-cursor-pointer" *ngFor="let export of pageItems" [class.export-disabled]="export.disabled"
            (click)="onEditExport(export)">
            <td><i class="bi bi-arrow-right-short"></i></td>
            <td>{{ export.name }}</td>
            <td>
              <span class="badge" [ngClass]="{
                'bg-info': export.exportType === 'raw',
                'bg-warning text-dark': export.exportType === 'aggregate',
                'bg-secondary': export.exportType === 'bufr'
              }">
                {{ export.exportType }}
              </span>
            </td>
            <td>
              <ng-container *ngFor="let seg of export.description | linkify">
                <a *ngIf="seg.isLink; else plainText" [href]="seg.href" target="_blank" rel="noopener noreferrer"
                  (click)="$event.stopPropagation()">{{ seg.content }}</a>
                <ng-template #plainText>{{ seg.content }}</ng-template>
              </ng-container>
            </td>
            <td>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm"
                  [ngClass]="export.disabled ? 'btn-outline-success' : 'btn-outline-warning'"
                  [title]="export.disabled ? 'Enable export' : 'Disable export'"
                  (click)="onToggleDisabledClick(export, $event)">
                  <i class="bi" [ngClass]="export.disabled ? 'bi-play-circle' : 'bi-pause-circle'"></i>
                </button>
                <button type="button" class="btn btn-sm btn-outline-danger" title="Delete export"
                  (click)="onDeleteClick(export, $event)">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="pageItems.length === 0">
            <td colspan="5" class="text-center text-muted py-4">
              No exports yet. Click "Add" to create one.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <app-export-specification-input-dialog #dlgExportInput (ok)="onExportInput()" />

  <!-- Delete Confirmation Dialog -->
  <app-delete-confirmation-dialog #dlgDeleteConfirm [itemName]="selectedExport?.name || ''"
    [itemType]="'export specification'" (deleteConfirmed)="onDeleteConfirm()" />

  <app-delete-confirmation-dialog #dlgDeleteAllConfirm [itemName]="'All'" [itemType]="'export specification'"
    (deleteConfirmed)="onDeleteAllConfirm()" />

  <!-- Enable/Disable Confirmation Dialog -->
  <app-toggle-disabled-confirmation-dialog #dlgToggleDisabled [itemName]="selectedExport?.name || ''"
    [itemType]="'export specification'" [isCurrentlyDisabled]="selectedExport?.disabled || false"
    [operationType]="selectedExport?.exportType + ' export' || ''" (toggleConfirmed)="onToggleDisabledConfirm()" />
</div>
