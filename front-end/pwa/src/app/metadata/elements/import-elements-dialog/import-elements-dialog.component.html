<ng-container *ngIf="open">
  <app-dialog [(open)]="open" [title]="'Import Elements'"
    [firstButtonOptions]="activeStep === 'review' && !transformedPreviewResponse.error ? {label: importing ? 'Importing...' : 'Confirm Import', color: 'primary', disable: importing || !!transformedPreviewResponse.error, closeDialogOnClick: false} : undefined"
    [secondButtonOptions]="{label: 'Cancel', closeDialogOnClick: false}"
    (firstButtonClick)="onConfirmImport()" (secondButtonClick)="onCancelClick()">

    <!-- Wizard Tab Navigation -->
    <div class="mb-3">
      <ul class="nav nav-tabs">
        <li class="nav-item" *ngFor="let step of wizardSteps">
          <button class="nav-link d-flex align-items-center gap-1" [class.active]="activeStep === step"
            [class.disabled]="isStepDisabled(step)" (click)="onStepTabClick(step)">
            <span class="step-badge"
              [class.bg-success]="hasStepBeenVisited(step) && isStepValid(step) && activeStep !== step"
              [class.bg-danger]="hasStepBeenVisited(step) && !isStepValid(step) && activeStep !== step"
              [class.bg-primary]="activeStep === step"
              [class.bg-secondary]="!hasStepBeenVisited(step) && activeStep !== step">
              <ng-container
                *ngIf="hasStepBeenVisited(step) && isStepValid(step) && activeStep !== step">&#10003;</ng-container>
              <ng-container *ngIf="!(hasStepBeenVisited(step) && isStepValid(step) && activeStep !== step)">{{
                getStepNumber(step) }}</ng-container>
            </span>
            {{ stepLabels[step] }}
          </button>
        </li>
      </ul>
    </div>

    <div class="row">

      <!-- Left column: Step configuration controls -->
      <div class="col-md-5 d-flex flex-column justify-content-between">

        <div class="step-content">

          <!-- ─── Step 1: Upload ─── -->
          <div *ngIf="activeStep === 'upload'">
            <div class="mb-3">
              <app-file-input [label]="'Select CSV File'" [buttonLabel]="'Upload File'" [fileName]="fileName"
                [disabled]="rawPreviewLoading" (fileSelected)="onFileSelected($event)" />
            </div>

            <hr />

            <div class="mb-3">
              <app-number-input [label]="'Rows to Skip (header)'" [(numValue)]="rowsToSkip"
                (numValueChange)="reLoadRawPreview()" />
            </div>

            <hr />

            <div class="mb-3">
              <app-delimeter-selector [label]="'Delimiter'" [(delimiter)]="delimiter"
                (delimiterChange)="reLoadRawPreview()" />
            </div>
          </div>

          <!-- ─── Step 2: Basic Info ─── -->
          <div *ngIf="activeStep === 'basic'">
            <app-element-import-basic-detail [(mapping)]="mapping" />
          </div>

          <!-- ─── Step 3: Element Type ─── -->
          <div *ngIf="activeStep === 'element-type'">
            <app-element-import-type-detail [(elementType)]="mapping.elementType" />
          </div>

          <!-- ─── Step 4: Extras ─── -->
          <div *ngIf="activeStep === 'extras'">
            <app-element-import-extras-detail [(mapping)]="mapping" />
          </div>

          <!-- ─── Step 5: Review ─── -->
          <div *ngIf="activeStep === 'review'">
            <div class="fw-bold mb-2">Review & Confirm</div>
            <div class="small text-muted mb-2">
              Review the transformed preview on the right. Click "Confirm Import" to import all rows.
            </div>

            <div *ngIf="importing" class="mt-2">
              <div class="spinner-border spinner-border-sm text-primary" role="status">
                <span class="visually-hidden">Importing...</span>
              </div>
              <span class="ms-2 small">Processing all rows...</span>
            </div>
          </div>

        </div>

        <!-- Navigation buttons -->
        <div class="d-flex justify-content-end gap-1 mt-2 pt-2 border-top">
          <button *ngIf="activeStep !== 'upload'" type="button" class="btn btn-sm btn-outline-secondary"
            (click)="onPrevious()">
            Previous
          </button>
          <button *ngIf="activeStep !== 'review'" type="button" class="btn btn-sm btn-outline-primary"
            (click)="onNext()">
            Next
          </button>
        </div>
      </div>

      <!-- Right column: Preview tables -->
      <div class="col-md-7">
        <div class="d-flex justify-content-end">
          <button type="button" class="btn btn-outline-info btn-sm" [disabled]="!rawPreviewResponse.sessionId"
            (click)="refreshPreview()">
            Refresh Preview
          </button>
        </div>

        <div class="mt-2">
          <app-import-preview-table [title]="'Skipped Rows Preview'" [columns]="rawPreviewResponse.skippedData.columns"
            [rows]="rawPreviewResponse.skippedData.rows" [totalRowCount]="rawPreviewResponse.skippedData.totalRowCount"
            [hasFile]="!!rawPreviewResponse.sessionId"
            [noFileMessage]="'Upload a CSV file to see a preview of skipped rows'" [maxHeight]="'15vh'"
            [loading]="rawPreviewLoading" />
        </div>

        <div class="mt-3">
          <app-import-preview-table [title]="'Raw Data Preview'" [columns]="rawPreviewResponse.previewData.columns"
            [rows]="rawPreviewResponse.previewData.rows" [totalRowCount]="rawPreviewResponse.previewData.totalRowCount"
            [hasFile]="!!rawPreviewResponse.sessionId"
            [noFileMessage]="'Upload a CSV file to see a preview of your raw data'" [maxHeight]="'20vh'"
            [loading]="rawPreviewLoading" />
        </div>

        <div class="mt-3">
          <app-import-preview-table [title]="'Transformed Data Preview'"
            [columns]="transformedPreviewResponse.previewData.columns"
            [rows]="transformedPreviewResponse.previewData.rows"
            [totalRowCount]="transformedPreviewResponse.previewData.totalRowCount"
            [error]="transformedPreviewResponse.error" [hasFile]="!!rawPreviewResponse.sessionId"
            [noFileMessage]="'Upload a CSV file to see a preview of the transformed data'" [maxHeight]="'20vh'"
            [loading]="transformedPreviewLoading" />
        </div>

      </div>

    </div>

  </app-dialog>
</ng-container>
