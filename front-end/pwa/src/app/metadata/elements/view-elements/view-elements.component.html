<div class="card border-0">
  <div class="card-header d-flex justify-content-end align-items-center px-1 py-0">
    <div class="d-flex align-items-center gap-2">
      <button *ngIf="isSystemAdmin" type="button" class="btn btn-outline-secondary btn-sm" (click)="onAddClick()">
        Add
      </button>
      <div *ngIf="isSystemAdmin">
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onImportClick()">
          Import
        </button>
        <app-import-elements-dialog #dlgImportElements />
      </div>
      <div *ngIf="isSystemAdmin">
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onBulkEditClick()">
          Bulk Edit
        </button>
        <app-bulk-edit-elements-dialog #dlgBulkEditElements />
      </div>
      <div>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onSearchClick()">
          Search
        </button>
        <app-elements-search-dialog #dlgSearchElements (searchedIdsChange)="onSearchInput($event)" />
      </div>
      <div>
        <app-drop-down-button [buttonText]="'Options'" [dropDownItems]="dropDownItems"
          (dropDownOptionClick)="onOptionsClick($event)" [offSetRight]="true" />
      </div>
      <div>
        <app-page-input [pageInputDefinition]="pageInputDefinition" />
      </div>
    </div>
  </div>

  <div class="card-body px-0">
    <div class="app-table-container" style="max-height: 80vh;">
      <table class="table table-hover table-sm">
        <thead>
          <tr>
            <th style="width: 2%;"></th>
            <th appSortableHeader="id" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Id</th>
            <th appSortableHeader="abbreviation" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Abbreviation</th>
            <th appSortableHeader="name" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Name</th>
            <th appSortableHeader="description" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Description</th>
            <th appSortableHeader="units" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Units</th>
            <th appSortableHeader="typeName" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Type</th>
            <th appSortableHeader="entryScaleFactor" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)" [title]="'Value entered by user will be divided by this factor before storage'">
              Scale Factor</th>
            <th appSortableHeader="comment" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
              (sort)="onSort($event)">Comment</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let element of pageItems" class="app-cursor-pointer" (click)="onEditClick(element.id)">
            <td><i class="bi bi-arrow-right-short"></i></td>
            <td>{{ element.id }}</td>
            <td>{{ element.abbreviation }}</td>
            <td>{{ element.name }}</td>
            <td>
              <ng-container *ngFor="let seg of element.description | linkify">
                <a *ngIf="seg.isLink; else plainText" [href]="seg.href" target="_blank" rel="noopener noreferrer"
                  (click)="$event.stopPropagation()">{{ seg.content }}</a>
                <ng-template #plainText>{{ seg.content }}</ng-template>
              </ng-container>
            </td>
            <td>{{ element.units }}</td>
            <td>{{ element.typeName }}</td>
            <td>{{ element.entryScaleFactor }}</td>
            <td>{{ element.comment }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <app-element-input-dialog #dlgInputElement />

  <app-delete-confirmation-dialog #dlgDeleteAllConfirm [itemName]="'All'" [itemType]="'element'"
    (deleteConfirmed)="onDeleteAllConfirm()" />
</div>
