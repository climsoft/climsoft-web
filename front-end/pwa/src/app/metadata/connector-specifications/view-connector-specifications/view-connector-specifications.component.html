<div class="card border-0">
   <div class="card-header d-flex justify-content-end align-items-center px-1 py-0">
      <div class="d-flex align-items-center gap-2">
         <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onAddConnectorClick()">
            Add
         </button>
         <div>
            <app-drop-down-button [buttonText]="'Options'" [dropDownItems]="['Delete All']"
               (dropDownOptionClick)="onOptionsClicked($event)" [offSetRight]="true" />
         </div>
         <div>
            <app-page-input [pageInputDefinition]="pageInputDefinition" (pageInputDefinitionChange)="loadConnectorSpecifications()" />
         </div>
      </div>
   </div>

   <div class="card-body px-0">
      <div class="app-table-container" style="max-height: 80vh;">
         <table class="table table-hover table-sm">
            <colgroup>
               <col style="width: 2%;" />
               <col style="width: 14%;" />
               <col style="width: 7%;" />
               <col style="width: 12%;" />
               <col style="width: 10%;" />
               <col style="width: 5%;" />
               <col style="width: 40%;" />
               <col style="width: 10%;" />
            </colgroup>
            <thead>
               <tr>
                  <th></th>
                  <th appSortableHeader="name" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
                     (sort)="onSort($event)">Name</th>
                  <th appSortableHeader="connectorType" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
                     (sort)="onSort($event)">Type</th>
                  <th appSortableHeader="hostName" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
                     (sort)="onSort($event)">Host</th>
                  <th appSortableHeader="cronSchedule" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
                     (sort)="onSort($event)">Schedule</th>
                  <th appSortableHeader="orderNumber" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
                     (sort)="onSort($event)">Order</th>
                  <th appSortableHeader="description" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
                     (sort)="onSort($event)">Description</th>
                  <th>Actions</th>
               </tr>
            </thead>
            <tbody>
               <tr class="app-cursor-pointer" *ngFor="let connector of pageItems"
                  [class.connector-disabled]="connector.disabled" (click)="onConnectorClick(connector.id, $event)">
                  <td><i class="bi bi-arrow-right-short"></i></td>
                  <td>{{ connector.name }}</td>
                  <td>
                     <span class="badge" [ngClass]="connector.connectorType === 'import' ? 'bg-success' : 'bg-primary'">
                        <i class="bi"
                           [ngClass]="connector.connectorType === 'import' ? 'bi-download' : 'bi-upload'"></i>
                        {{ connector.connectorType }}
                     </span>
                  </td>
                  <td>{{ connector.hostName }}</td>
                  <td>{{ connector.cronSchedule }}</td>
                  <td>{{ connector.orderNumber }}</td>
                  <td>
                     <ng-container *ngFor="let seg of connector.description | linkify">
                        <a *ngIf="seg.isLink; else plainText" [href]="seg.href" target="_blank"
                           rel="noopener noreferrer" (click)="$event.stopPropagation()">{{ seg.content }}</a>
                        <ng-template #plainText>{{ seg.content }}</ng-template>
                     </ng-container>
                  </td>
                  <td>
                     <div class="d-flex gap-2">
                        <button type="button" class="btn btn-sm"
                           [ngClass]="connector.disabled ? 'btn-outline-success' : 'btn-outline-warning'"
                           [title]="connector.disabled ? 'Enable connector' : 'Disable connector'"
                           (click)="onToggleDisabledClick(connector, $event)">
                           <i class="bi" [ngClass]="connector.disabled ? 'bi-play-circle' : 'bi-pause-circle'"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" title="Delete connector"
                           (click)="onDeleteClick(connector, $event)">
                           <i class="bi bi-trash"></i>
                        </button>
                     </div>
                  </td>
               </tr>
            </tbody>
         </table>
      </div>
   </div>

   <!-- Connector Input Dialog -->
   <app-connector-specification-input-dialog #dlgConnectorInput (ok)="onConnectorInput()" />

   <!-- Delete Confirmation Dialog -->
   <app-delete-confirmation-dialog #dlgDeleteConfirm [itemName]="selectedConnector?.name || ''"
      [itemType]="'connector specification'" (deleteConfirmed)="onDeleteConfirm()" />

   <app-delete-confirmation-dialog #dlgDeleteAllConfirm [itemName]="'All'" [itemType]="'connector specification'"
      (deleteConfirmed)="onDeleteAllConfirm()" />

   <!-- Enable/Disable Confirmation Dialog -->
   <app-toggle-disabled-confirmation-dialog #dlgToggleDisabled [itemName]="selectedConnector?.name || ''"
      [itemType]="'connector'" [isCurrentlyDisabled]="selectedConnector?.disabled || false"
      [operationType]="selectedConnector?.connectorType || ''" (toggleConfirmed)="onToggleDisabledConfirm()" />
</div>
