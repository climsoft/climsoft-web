<div *ngIf="pageInputDefinition.totalRowCount && pageInputDefinition.pageSize && pageInputDefinition.page"
    class="d-flex align-items-center px-2">

    <div class="d-flex align-items-center">
        <button type="button" class="btn btn-sm" (click)="onFirst()" [title]="'First page'">
            <i class="bi bi-chevron-double-left"></i>
        </button>
        <button type="button" class="btn btn-sm" (click)="onPrevious()" [title]="'Previous page'">
            <i class="bi bi-chevron-left"></i>
        </button>
        <app-drop-down-container [(displayDropDown)]="displayVisibleRowsDropDown">
            <div main-content (click)="onDisplayVisibleRowsDropDown()" class="cursor-pointer" [title]="'page position'">
                {{ pageInputDefinition.page }} / {{ pageInputDefinition.totalPages | number:'1.0-0' }}
            </div>
            <div drop-down-content class="card">
                <div class="card-body">
                    <div>Maximum visible rows:</div>
                    <app-radio-buttons-input [groupName]="'max_visible_rows'" [asButtons]="false"
                        [groupItems]="[{ label: '31'}, { label: '365'}]"
                        [checkedValue]="pageInputDefinition.pageSize + ''"
                        (checkedValueChange)="onPageSizeSelection($event)" />
                </div>
            </div>
        </app-drop-down-container>
        <button type="button" class="btn btn-sm" (click)="onNext()" [title]="'Next page'">
            <i class="bi bi-chevron-right"></i>
        </button>
        <button type="button" class="btn btn-sm" (click)="onLast()" [title]="'Last page'">
            <i class="bi bi-chevron-double-right"></i>
        </button>
    </div>

    <div class="d-flex align-items-center mx-2" [title]="'record(s) found'">
        [{{ pageInputDefinition.totalRowCount | number:'1.0-0' }}]
    </div>

</div>
