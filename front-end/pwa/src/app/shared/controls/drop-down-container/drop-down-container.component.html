<div class="position-relative w-100" appCloseDropDown (closeDropdown)="closeDropdown()">
    <ng-content select="[main-content]"></ng-content>
    <div *ngIf="displayDropDown" class="border border-dark rounded drop-down-container"
        [class.right-offset-drop-down-container]="offSetRight" [style.max-height.px]="maxHeight" [style.min-width.px]="minWidth">
        <ng-content select="[drop-down-content]"></ng-content>
    </div>
</div>
