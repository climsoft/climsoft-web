<div class="card border-0">
  <div class="card-body px-0">
    <div class="app-table-container" style="max-height: 80vh;">
      <table class="table table-hover table-sm">
        <colgroup>
          <col style="width: 2%;" />
          <col style="width: 20%;" />
          <col style="width: 78%;" />
        </colgroup>
        <thead>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          <tr class="app-cursor-pointer" *ngFor="let setting of settings" (click)="onSettingClick(setting.id)">
            <td><i class="bi bi-arrow-right-short"></i></td>
            <td>{{ setting.name }}</td>
            <td>{{ setting.description }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <app-general-setting-input-dialog #dlgEditSetting (ok)="onSettingSaved()" />
</div>
