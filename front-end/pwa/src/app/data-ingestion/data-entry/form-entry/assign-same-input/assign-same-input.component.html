<app-dialog [(open)]="open" [title]="'Assign Same Input'"
    [firstButtonOptions]="{label: 'Ok', color: 'primary', closeDialogOnClick: false}"
    (firstButtonClick)="onOkClick()" [secondButtonOptions]="{label: 'Cancel', color: 'secondary', closeDialogOnClick: true}">
    <app-text-input [label]="'Value Flag'" [(value)]="input.valueFlag"/>
    <app-text-input [label]="'Comment'" [(value)]="input.comment"/>
</app-dialog>
