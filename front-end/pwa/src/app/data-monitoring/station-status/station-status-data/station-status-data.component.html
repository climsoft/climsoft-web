<app-dialog [(open)]="open" [title]="title" [firstButtonOptions]="{label: 'Close', color: 'secondary', closeDialogOnClick: true}">
    <div *ngIf="station && open">

        <div>
            <table class="table table-striped table-sm table-hover">
                <thead>
                    <tr>
                        <th>Element</th>
                        <th>Level</th>
                        <th>Source</th>
                        <th>Date Time</th> 
                        <th>Interval</th> 
                        <th>Value</th> 
                        <th>Flag</th> 
                    </tr>
                </thead>
                <tbody class="table-group-divider">
                    <tr class="app-cursor-pointer" *ngFor="let observation of observations">
                        <td>{{ observation.elementId + ' - ' + observation.elementName }}</td>
                        <td>{{ observation.level }}</td>
                        <td>{{ observation.sourceName }}</td>
                        <td>{{ observation.presentableDatetime }}</td>
                        <td>{{ observation.intervalName }}</td>
                        <td>{{ observation.valueStr }}</td> 
                        <td>{{ observation.flagStr }}</td> 
                    </tr>
                </tbody>
            </table>
        </div>


    </div>
</app-dialog>
